<!DOCTYPE html>
<html>
  <head>
    <title>Jonathan's Trip Pins</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="../lib/leaflet-providers.js"></script>
    <link rel="stylesheet" href="../lib/MarkerCluster.css" />
    <link rel="stylesheet" href="../lib/MarkerCluster.Default.css" />
    <script src="../lib/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="../lib/easy-button.css" />
    <script src="../lib/easy-button.js"></script>
    <link rel="stylesheet" href="../lib/leaflet.legend.css" />
    <script type="text/javascript" src="../lib/leaflet.legend.js"></script>
    <link rel="stylesheet" href="../lib/coord-projection.css" />
    <script type="text/javascript" src="../lib/coord-projection.js"></script>
    <script type="text/javascript" src="../lib/leaflet-omnivore.min.js"></script>
    <link rel="stylesheet" href="../trip_map.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">
        Costa Rica - Jan 1 - 8, 2025
        </h1>
      </div>
      <div class="map-container">
        <div class="map-frame">
          <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div style="height: 100px; line-height: 100px; text-align: center;">
              <span id="status-container">Loading map data...</span>
            </div>
          </div>
          <div id="map-id"></div>
        </div>
      </div>
    </div>
    <!-- file path of trip locations visited-->
    <div id="data-file-path" data-file="data/Costa Rica 2025.gpx" style="display: none;"></div>
    <script src="about.js" type="text/javascript"></script>
    <script src="map_data.js" type="text/javascript"></script>
    <script src="base_maps.js" type="text/javascript"></script>
    <script src="trip_map.js" type="text/javascript"></script>
  </body>
</html>
